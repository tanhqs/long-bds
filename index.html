<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BĐS Giá Rẻ</title>

<style>
body{font-family:Arial;margin:0;padding:10px;background:#f5f5f5}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:10px}
.item{background:#fff;border-radius:8px;overflow:hidden;box-shadow:0 2px 6px rgba(0,0,0,.1)}
.item img{width:100%;height:160px;object-fit:cover}
.item a{display:block;padding:10px;font-weight:bold;color:#333;text-decoration:none}
.item a:hover{color:#e60023}
</style>
</head>

<body>

<div class="grid" id="list"></div>

<script>
fetch("https://long-bds.blogspot.com/feeds/posts/default/-/gia-re?alt=json")
.then(res=>res.json())
.then(data=>{
  let html="";
  data.feed.entry.forEach(e=>{
    let link=e.link.find(l=>l.rel==="alternate").href;
    let title=e.title.$t;
    let img=(e.media$thumbnail)?e.media$thumbnail.url.replace("s72","s400"):"";

    html+=`
    <div class="item">
      <img src="${img}" alt="">
      <a href="${link}" target="_blank">${title}</a>
    </div>`;
  });
  document.getElementById("list").innerHTML=html;
});
</script>

</body>
</html>
