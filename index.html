<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BĐS Giá Rẻ</title>
<style>
*{box-sizing:border-box}
body{margin:0;padding:14px;font-family:Arial,sans-serif;background:#f3f4f6;color:#1f2937}
.wrap{max-width:1200px;margin:0 auto}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:16px}
.card{background:#fff;border-radius:16px;overflow:hidden;box-shadow:0 3px 14px rgba(0,0,0,.08);transition:.18s}
.card:hover{transform:translateY(-4px);box-shadow:0 10px 26px rgba(0,0,0,.14)}
.thumb-wrap{position:relative;display:block;aspect-ratio:4/3;background:#e5e7eb;overflow:hidden}
.thumb{width:100%;height:100%;object-fit:cover;display:block}
.badges{position:absolute;top:10px;left:10px;display:flex;gap:6px;flex-wrap:wrap;z-index:2}
.badge{padding:5px 8px;border-radius:999px;font-size:11px;font-weight:700;color:#fff}
.badge-hot{background:#ef4444}
.badge-sale{background:#f59e0b}
.badge-type{background:#111827}
.content{padding:13px}
.title{display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;font-size:18px;font-weight:700;line-height:1.35;min-height:48px;margin:0 0 8px;color:#111;text-decoration:none}
.title:hover{color:#c81e1e}
.meta{font-size:13px;color:#6b7280;margin-bottom:10px;min-height:20px}
.price{font-size:24px;font-weight:800;color:#dc2626;margin-bottom:10px}
.btn{display:inline-block;padding:9px 12px;border-radius:10px;background:#111;color:#fff;text-decoration:none;font-size:13px}
.loading,.empty{text-align:center;padding:30px;color:#6b7280}
</style>
</head>
<body>
<div class="wrap">
  <div id="app" class="loading">Đang tải dữ liệu...</div>
</div>

<script>
function cleanTitle(str){
  return (str || '').replace(/\s+/g,' ').replace(/^[🔥⭐✔✅]+\s*/,'').trim();
}

function extractPrice(title){
  const t = title.toLowerCase();

  let m = t.match(/(?:giá|chỉ)\s*([0-9.,x]+)\s*t[ỷy]/i);
  if (m) return m[1].replace(/x/g,'').replace(',', '.') + ' tỷ';

  m = t.match(/([0-9.,x]+)\s*t[ỷy]/i);
  if (m) return m[1].replace(/x/g,'').replace(',', '.') + ' tỷ';

  m = t.match(/([0-9.,]+)\s*tr/i);
  if (m) return m[1].replace(',', '.') + ' triệu';

  return 'Liên hệ';
}

function extractArea(title){
  const m = title.match(/(\d{2,4})\s*m2/i);
  return m ? m[1] + 'm²' : '';
}

function extractLocation(title){
  const patterns = [
    /(quận\s*\d+)/i,
    /(q\.?\s*\d+)/i,
    /(gò vấp)/i,
    /(hóc môn)/i,
    /(củ chi)/i,
    /(tân bình)/i,
    /(thủ đức)/i,
    /(phường\s*[\w\d]+)/i,
    /(p\.?\s*[\w\d]+)/i
  ];
  for (let i = 0; i < patterns.length; i++) {
    const m = title.match(patterns[i]);
    if (m) return m[1];
  }
  return '';
}

function detectType(title){
  const t = title.toLowerCase();
  if (t.includes('đất')) return 'Đất';
  if (t.includes('biệt thự')) return 'Biệt thự';
  if (t.includes('căn hộ')) return 'Căn hộ';
  if (t.includes('nhà vườn')) return 'Nhà vườn';
  if (t.includes('nhà')) return 'Nhà';
  return 'BĐS';
}

function shortTitle(t){
  return t
    .replace(/(giá|chỉ).*$/i,'')
    .replace(/\d+\s*m2/ig,'')
    .replace(/^bán\s+/i,'')
    .replace(/\s{2,}/g,' ')
    .trim()
    .replace(/[,\-–|:;]+$/,'');
}

function extractBloggerImage(entry){
  let rawImg = '';
  let html = '';

  // luôn lấy content/summary trước để ưu tiên ảnh thật trong bài
  html = (entry.content && entry.content.$t) ? entry.content.$t : '';
  if (!html && entry.summary && entry.summary.$t) html = entry.summary.$t;

  // 1) ưu tiên <img src="...blogger.googleusercontent.com...">
  if (html) {
    const imgMatches = html.match(/<img[^>]+src="([^"]+)"/ig);
    if (imgMatches) {
      for (let i = 0; i < imgMatches.length; i++) {
        const m = imgMatches[i].match(/src="([^"]+)"/i);
        if (m && m[1] && m[1].indexOf('blogger.googleusercontent.com/img') !== -1) {
          rawImg = m[1];
          break;
        }
      }
    }
  }

  // 2) nếu chưa có thì lấy từ <a href="...jpg"> ảnh lớn
  if (!rawImg && html) {
    const linkMatches = html.match(/<a[^>]+href="([^"]+)"/ig);
    if (linkMatches) {
      for (let i = 0; i < linkMatches.length; i++) {
        const m = linkMatches[i].match(/href="([^"]+)"/i);
        if (
          m && m[1] &&
          m[1].indexOf('blogger.googleusercontent.com/img') !== -1 &&
          /\.(jpg|jpeg|png|webp)(\?|$)/i.test(m[1])
        ) {
          rawImg = m[1];
          break;
        }
      }
    }
  }

  // 3) cuối cùng mới fallback sang media$thumbnail
  if (!rawImg && entry.media$thumbnail && entry.media$thumbnail.url) {
    rawImg = entry.media$thumbnail.url;
  }

  // 4) resize về ảnh nhẹ
  if (rawImg && rawImg.indexOf('blogger.googleusercontent.com/img') !== -1) {
    return rawImg
      .replace('/s72-c/', '/w400-h300-p-k-no-nu/')
      .replace('/s600/', '/w400-h300-p-k-no-nu/')
      .replace('/s1280/', '/w400-h300-p-k-no-nu/')
      .replace('/s1600/', '/w400-h300-p-k-no-nu/')
      .replace('=s72-c', '=w400-h300-p-k-no-nu')
      .replace('=s600', '=w400-h300-p-k-no-nu')
      .replace('=s1280', '=w400-h300-p-k-no-nu')
      .replace('=s1600', '=w400-h300-p-k-no-nu');
  }

  return 'https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEi5I6M0c8ijHf-placeholder/w400/default-real-estate.jpg';
}

function renderBloggerFeed(data){
  const app = document.getElementById('app');
  const entries = (data && data.feed && data.feed.entry) ? data.feed.entry : [];

  if (!entries.length) {
    app.className = 'empty';
    app.innerHTML = 'Không có bài viết nào.';
    return;
  }

  let html = '<div class="grid">';

  for (let i = 0; i < Math.min(entries.length, 12); i++) {
    const e = entries[i];
    const raw = cleanTitle(e.title && e.title.$t ? e.title.$t : 'Không có tiêu đề');

    let link = '#';
    if (e.link) {
      for (let j = 0; j < e.link.length; j++) {
        if (e.link[j].rel === 'alternate') {
          link = e.link[j].href;
          break;
        }
      }
    }

    const img = extractBloggerImage(e);
    const price = extractPrice(raw);
    const area = extractArea(raw);
    const location = extractLocation(raw);
    const title = shortTitle(raw);

    let badges = '';
    badges += '<span class="badge badge-type">' + detectType(raw) + '</span>';
    if (price !== 'Liên hệ') badges += '<span class="badge badge-sale">Giá tốt</span>';

    html += ''
      + '<div class="card">'
      +   '<a class="thumb-wrap" href="' + link + '" target="_blank" rel="noopener noreferrer">'
      +     '<div class="badges">' + badges + '</div>'
      +     '<img class="thumb" src="' + img + '" alt="">'
      +   '</a>'
      +   '<div class="content">'
      +     '<a class="title" href="' + link + '" target="_blank" rel="noopener noreferrer">' + title + '</a>'
      +     '<div class="meta">' + ((location || '') + (location && area ? ' · ' : '') + (area || '')) + '</div>'
      +     '<div class="price">' + price + '</div>'
      +     '<a class="btn" href="' + link + '" target="_blank" rel="noopener noreferrer">Xem chi tiết</a>'
      +   '</div>'
      + '</div>';
  }

  html += '</div>';
  app.innerHTML = html;
}
</script>

<script src="https://long-bds.blogspot.com/feeds/posts/default/-/gia-re?alt=json-in-script&callback=renderBloggerFeed&max-results=4"></script>
</body>
</html>
